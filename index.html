<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flow Twist | Fuzzy Fleurs</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500&family=Playfair+Display&family=Monsieur+La+Doulaise&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-beige: #F9F8F6;
            --brand-rose: #A37B73;
            --text-dark: #333333;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-beige);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        
        nav {
            display: flex;
            justify-content: center; 
            align-items: center;
            padding: 2.5rem 8%;
            background: #FFFFFF;
            width: 100%;
            position: relative;
            z-index: 1000;
        }

        .nav-links {
            display: flex;
            gap: 3rem;
            list-style: none;
        }

        .nav-links a {
            text-decoration: none;
            color: #444; 
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 3px;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .nav-links a.active {
            color: var(--brand-rose);
        }

        .nav-links a:hover {
            color: var(--brand-rose);
        }

    
        .hero {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }

        .card {
            background: white;
            width: 100%;
            max-width: 1100px;
            padding: 100px 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 4px 30px rgba(0,0,0,0.02);
        }

        
        .logo-text-wrapper {
            margin-bottom: 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .main-title {
            font-family: 'Monsieur La Doulaise', cursive;
            font-size: 11rem; 
            color: var(--brand-rose);
            line-height: 0.7; 
            margin: 0;
            font-weight: 400;
        }

        .sub-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.2rem; 
            letter-spacing: 15px; 
            text-transform: uppercase;
            color: var(--brand-rose);
            margin-top: 10px;
            font-weight: 300;
        }

        
        .tagline-box {
            background: #F4F4F4;
            padding: 1.5rem 5rem;
        }

        .tagline-text {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            letter-spacing: 2px;
            color: #222;
        }

        
        @media (max-width: 768px) {
            .main-title { font-size: 6rem; }
            .sub-title { font-size: 0.8rem; letter-spacing: 8px; }
            .nav-links { gap: 1.5rem; }
            .tagline-box { padding: 1.5rem 2rem; }
        }
    </style>
</head>
<body>

    <nav>
        <ul class="nav-links">
            <li><a href="#" class="active">HOME</a></li>
            <li><a href="#">ABOUT</a></li>
            <li><a href="#">SERVICES</a></li>
            <li><a href="#">CONTACT</a></li>
        </ul>
    </nav>

    <main class="hero">
        <div class="card">
            
            <div class="logo-text-wrapper">
                <h1 class="main-title">FlowTwist</h1>
                <h2 class="sub-title">Fuzzy Fleurs</h2>
            </div>

            <div class="tagline-box">
                <p class="tagline-text">Let's grow and bloom together!</p>
            </div>

        </div>
    </main>

</body>
</html>
